name: CI

on:
  push:
    branches: [ main ]
    # Skip CI for documentation and image-only changes to avoid unnecessary runner usage
    paths:
      - 'Solutions/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/ci.yml'

# Cancel any in-progress run for the same branch to avoid wasting runner minutes
# on stale commits when multiple pushes arrive in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-csharp:
    runs-on: ubuntu-latest
    # Prevent runaway jobs from consuming excess minutes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Explicitly request the SDK version matching the project's TargetFramework (net9.0)
          dotnet-version: '9.0.x'
          # Cache NuGet packages to avoid re-downloading on every run
          cache: true
          cache-dependency-path: Solutions/CSharp/**/*.csproj
      
      - name: Build C# Solutions
        run: dotnet build Solutions/CSharp/CopilotAdventures.sln

      - name: Run C# Tests
        # Runs the embedded Gridlock Arena test suite via the console app's 'mythos-test' entry point
        run: dotnet run --project Solutions/CSharp/CopilotAdventures.sln -- mythos-test
  
  build-javascript:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache npm dependencies for the Gridlock Arena test package
          cache: 'npm'
          cache-dependency-path: Solutions/JavaScript/The-Gridlock-Arena-of-Mythos/package.json
      
      - name: Validate JavaScript Files
        run: |
          for f in Solutions/JavaScript/*.js; do node --check "$f"; done
          echo "JavaScript syntax validation passed"

      - name: Run JavaScript Tests
        # Run the Gridlock Arena test suite which has its own package.json and test runner
        run: |
          cd Solutions/JavaScript/The-Gridlock-Arena-of-Mythos
          npm ci
          npm test
  
  build-python:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Validate Python Files
        run: |
          python -m py_compile Solutions/Python/*.py
          echo "Python syntax validation passed"

      - name: Run Python Tests
        # Run the Gridlock Arena test suite; exits with non-zero on failure
        run: python Solutions/Python/test_gridlock_arena.py
