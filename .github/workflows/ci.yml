name: CI

on:
  push:
    branches: [ main ]
    # Skip CI for documentation and image-only changes to avoid unnecessary runner usage
    paths:
      - 'Solutions/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Solutions/**'
      - '.github/workflows/ci.yml'

# Cancel any in-progress run for the same branch to avoid wasting runner minutes
# on stale commits when multiple pushes arrive in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-csharp:
    runs-on: ubuntu-latest
    # Prevent runaway jobs from consuming excess minutes
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Explicitly request the SDK version matching the project's TargetFramework (net9.0)
          dotnet-version: '9.0.x'
          # Cache the global NuGet package store to avoid re-downloading packages on every run
          cache: true
          cache-dependency-path: Solutions/CSharp/**/*.csproj
      
      - name: Build C# Solutions
        run: dotnet build Solutions/CSharp/CopilotAdventures.sln
  
  build-javascript:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Validate JavaScript Files
        run: |
          # Use find to recurse into subdirectories and catch all .js files,
          # not just those at the top level of Solutions/JavaScript/
          find Solutions/JavaScript -name "*.js" -print0 | xargs -0 -I{} node --check {}
          echo "JavaScript syntax validation passed"
  
  build-python:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Validate Python Files
        run: |
          python -m py_compile Solutions/Python/*.py
          echo "Python syntax validation passed"
